services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lashbot
      POSTGRES_PASSWORD: lashbot
      POSTGRES_DB: lashbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lashbot -d lashbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
